<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="Description" content="A static website using Python to count down the days left until school ends.">
<title>Time Remaining</title>
<script src="https://cdn.jsdelivr.net/npm/brython@3/brython.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/brython@3/brython_stdlib.js"></script>
<link rel="stylesheet" href="styles.css">
</head>

<body onload="brython()">
<div class="container">

<h2>School Time Remaining:</h2>
<br>
<div id="remtimed"></div> <span>days</span>
<div id="remtimeh"></div> <span>hours</span>
<div id="remtimem"></div> <span>minutes</span>
<div id="remtimes"></div> <span>seconds</span>

<br>

<h2>Total Time Remaining:</h2>
<br>
<div id="remd"></div> <span>days</span>
<div id="remh"></div> <span>hours</span>
<div id="remm"></div> <span>minutes</span>
<div id="rems"></div> <span>seconds</span>

<br>

<h2>Absolute Times:</h2>
<br>
<div id="hleft"></div> <div id="hr">hours</div>
<br>
<div id="mleft"></div> <div id="mn">minutes</div>
<br>
<div id="sleft"></div> <div id="sc">seconds</div>
<br>
<br>
<span id="status_text"></span>


<script type="text/python" src="script.py"></script>
</div>
</body>
</html>
